# air_clean_robot parameters

serial_air_quality_node:
  ros__parameters:
    serial_port: "/dev/ttyACM0"
    baudrate: 9600
    zone_id: "A"
    publish_topic: "/air_quality"
    warmup_sec: 10.0
    reconnect_sec: 3.0

sim_air_quality_publisher:
  ros__parameters:
    zone_id: "A"
    publish_topic: "/air_quality"
    mode: "dirty"
    publish_period_sec: 1.0

air_quality_task_manager:
  ros__parameters:
    air_quality_topic: "/air_quality"
    target_zone: "A"
    pm25_high_threshold: 10.0
    pm25_low_threshold: 10.0
    window_size: 5
    cleaning_duration_sec: 30.0
    use_nav2: true

    dirty_zone_x: 1.0
    dirty_zone_y: 0.0
    dirty_zone_yaw: 0.0

    home_x: 0.04172402517543966
    home_y: -0.0379323343077205
    home_yaw: -0.14707094383154637

    nav2_wait_timeout_sec: 5.0

manual_nav_controller:
  ros__parameters:
    command_topic: "/air_clean_command"
    use_nav2: true

    node_1_x: 2.3018288616776856
    node_1_y: -0.008024689603752288
    node_1_yaw: 0.4217097051530775

    node_2_x: 2.352437292135011
    node_2_y: -2.7041570456321136
    node_2_yaw: -0.3094564395372423

    node_3_x: 1.0881550059200746
    node_3_y: -2.5840552651613824
    node_3_yaw: -3.132554802973684

    home_x: 0.04172402517543966
    home_y: -0.0379323343077205
    home_yaw: -0.14707094383154637

    nav2_wait_timeout_sec: 5.0

